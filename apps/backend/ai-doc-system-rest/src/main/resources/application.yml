server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/doc_generator?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: always
  # Flyway数据库迁移配置
  flyway:
    enabled: true
    baseline-on-migrate: true  # 对已存在的数据库启用baseline
    baseline-version: 0  # baseline版本号
    locations: classpath:db/migration  # 迁移脚本位置
    encoding: UTF-8
    validate-on-migrate: true  # 迁移时验证

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: INPUT

logging:
  level:
    com.aiid.aidoc: INFO

# 授权配置
license:
  enabled: true
  path: ${LICENSE_PATH:license.lic}

