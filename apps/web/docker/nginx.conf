server {
    listen 80;
    server_name localhost;

    # 开启 gzip 压缩，提高加载速度
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json;
    gzip_vary on;

    # 设置上传文件大小限制
    client_max_body_size 10M;

    # 1. 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 转发给 Java 后端
    # 后端 Controller 路径如 /api/v1/documents, /api/v1/documents/{id}/blocks
    # 前端请求 /api/v1/documents -> http://backend:8080/api/v1/documents
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. 转发给 Python Agent
    # Agent 路由如 /agent/test
    # 前端请求 /agent/test -> http://agent:5000/agent/test
    # 注意：proxy_pass 不带结尾斜杠，表示保留原始请求路径
    location /agent/ {
        proxy_pass http://agent:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 流式响应配置（关键！）
        proxy_buffering off;           # 禁用代理缓冲，确保流式响应实时传输
        proxy_cache off;               # 禁用缓存
        proxy_read_timeout 1200s;      # 读取超时设置为 20 分钟
        proxy_send_timeout 1200s;      # 发送超时设置为 20 分钟
        proxy_connect_timeout 60s;     # 连接超时

        # SSE 特定头
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        # chunked_transfer_encoding off;

        # 禁用 gzip 压缩（SSE 流式响应不应压缩）
        gzip off;
    }

    # 3.1 专门针对流式接口的配置（更严格的 SSE 设置）
    location /agent/workflow/chat/stream {
        proxy_pass http://agent:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 完全禁用缓冲和缓存
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # 超长超时（章节生成+校验可能需要较长时间）
        proxy_read_timeout 1800s;      # 30 分钟
        proxy_send_timeout 1800s;
        proxy_connect_timeout 60s;

        # HTTP/1.1 + SSE 必需配置
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        # chunked_transfer_encoding off; # 允许分块传输，避免 HTTP/2 协议错误

        # 禁用压缩
        gzip off;

        # 添加 SSE 相关响应头
        add_header X-Accel-Buffering no;
    }

    # 3.2 批量生成接口配置（非流式，但耗时较长）
    location /agent/workflow/chat/batch {
        proxy_pass http://agent:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 超长超时（批量章节生成可能需要较长时间）
        proxy_read_timeout 600s;       # 10 分钟
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # HTTP/1.1
        proxy_http_version 1.1;
    }

    # 错误页面配置
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
