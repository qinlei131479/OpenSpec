version: '3.9'

services:
  aidoc-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: aidoc-web:latest
    container_name: ai-doc-web
    ports:
      - "4998:80"
    restart: unless-stopped
    # 可选：如果需要自定义时区或代理
    environment:
      - TZ=Asia/Shanghai
    # 可选：健康检查
    # healthcheck:
    #   test: ["CMD", "wget", "-qO-", "http://localhost/aidoc/"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3

