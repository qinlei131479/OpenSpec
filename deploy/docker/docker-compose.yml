services:
  # 1. Frontend (Web)
  web:
    image: ${DOCKER_REGISTRY:-}archspec-web:${TAG:-latest}
    container_name: archspec-web
    ports:
      - "${WEB_PORT}:80"
    restart: unless-stopped
    networks:
      - archspec-net

  # 2. Backend (Java)
  backend:
    image: ${DOCKER_REGISTRY:-}archspec-backend:${TAG:-latest}
    container_name: archspec-backend
    ports:
      - "${BACKEND_PORT}:8080"
    restart: unless-stopped
    volumes:
      - ${LICENSE_FILE:-./license.lic}:/app/license.lic:ro
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      LICENSE_PATH: /app/license.lic
    networks:
      - archspec-net

  # 3. AI Agent (Python)
  agent:
    image: ${DOCKER_REGISTRY:-}archspec-agent:${TAG:-latest}
    container_name: archspec-agent
    ports:
      - "${AGENT_PORT}:5000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY}
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - PROMPT_LABEL=${PROMPT_LABEL}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-archspec}:${POSTGRES_PASSWORD:-archspec_doc_pass}@archspec-postgres:5432/doc_generator
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - archspec-net

  # 4. Database (MySQL)
  mysql:
    image:  ${DOCKER_REGISTRY:-}mysql:8.0  # mysql 8.0 当前使用最广泛、稳定的版本
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      # 自动初始化数据库
      - ../../script/backend/initial_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - archspec-net

  # 5. PostgreSQL Memory Database (for LangGraph Checkpointer)
  postgres:
    image: postgres:15-alpine
    container_name: archspec-postgres
    environment:
      POSTGRES_DB: doc_generator
      POSTGRES_USER: ${POSTGRES_USER:-archspec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archspec_doc_pass}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - archspec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archspec}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  archspec-net:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
