services:
  # 1. Frontend (Web)
  web:
    image: ${DOCKER_REGISTRY:-}archspec-web:${TAG:-latest}
    container_name: archspec-web
    ports:
      - "${WEB_PORT}:80"
    restart: unless-stopped
    networks:
      - archspec-net

  # 2. Backend (Java)
  backend:
    image: ${DOCKER_REGISTRY:-}archspec-backend:${TAG:-latest}
    container_name: archspec-backend
    ports:
      - "${BACKEND_PORT}:8080"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=public
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DATABASE_INIT_ENABLED: false  # 生产环境禁用自动初始化，手动执行
    networks:
      - archspec-net

  # 3. AI Agent (Python)s
  agent:
    image: ${DOCKER_REGISTRY:-}archspec-agent:${TAG:-latest}
    container_name: archspec-agent
    ports:
      - "${AGENT_PORT}:5000"
    restart: unless-stopped
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY}
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - PROMPT_LABEL=${PROMPT_LABEL}
      - DEFAULT_CASE_KB_IDS=${DEFAULT_CASE_KB_IDS}
      - DEFAULT_STAND_KB_IDS=${DEFAULT_STAND_KB_IDS}
      - MAX_TOOL_MESSAGES=${MAX_TOOL_MESSAGES}
      - MAX_TOTAL_TOKENS=${MAX_TOTAL_TOKENS}
      - MIN_CONTENT_THRESHOLD=${MIN_CONTENT_THRESHOLD}
      - MAX_RESEARCH_LOOPS=${MAX_RESEARCH_LOOPS}
      - MAX_AUDIT_LOOPS=${MAX_AUDIT_LOOPS}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - archspec-net

  # 4. Database (PostgreSQL) || 本地调试使用独立环境
  postgres:
    image: postgres:15-alpine
    container_name: archspec-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 自动初始化数据库脚本
      - ../../script/backend/initial_schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - archspec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  archspec-net:
    driver: bridge

volumes:
  postgres_data:
